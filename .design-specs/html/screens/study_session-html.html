<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>study_session</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700;800&display=swap');
        :root {
            --bg-deep: #0E1112;
            --accent-teal: #20B2AA;
            --accent-amber: #FFC107;
            --muted-slate: #94A3B8;
            --white-soft: rgba(255, 255, 255, 0.06);
            --card-bg-start: #1A1E1F;
            --card-bg-end: #141718;
        }
        .iphone-frame {
            width: 393px;
            height: 852px;
            background-color: var(--bg-deep);
            position: relative;
            border-radius: 0px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            overflow: hidden;
            margin: 2rem auto;
        }
        .editorial-title {
            font-family: 'Playfair Display', serif;
        }
        .label-caps {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }
        .tactile-card {
            background: linear-gradient(145deg, var(--card-bg-start), var(--card-bg-end));
            border: 1px solid var(--white-soft);
            box-shadow: 0 4px 24px rgba(0,0,0,0.3), inset 0 1px 1px rgba(255,255,255,0.02);
        }
        .primary-teal {
            background: linear-gradient(135deg, var(--accent-teal) 0%, #178F88 100%);
            box-shadow: 0 4px 15px rgba(32, 178, 170, 0.25);
        }
        .dot-progress-segment {
            height: 4px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.1);
            flex: 1;
        }
        .dot-progress-active {
            background: var(--accent-teal);
        }
    </style>
</head>
<body class="bg-neutral-900 font-['Inter'] antialiased">
    <div class="iphone-frame flex flex-col">
        <!-- #header_001 -->
        <header class="flex-shrink-0 pt-16 px-8 pb-4">
            <div class="flex items-center justify-between mb-8">
                <button class="flex items-center gap-1 text-[var(--muted-slate)] active:opacity-60">
                    <iconify-icon icon="ph:caret-left-bold" class="text-xl"></iconify-icon>
                    <span class="text-sm font-medium">Back</span>
                </button>
                <div class="flex gap-1.5 w-32">
                    <div class="dot-progress-segment dot-progress-active"></div>
                    <div class="dot-progress-segment dot-progress-active"></div>
                    <div class="dot-progress-segment dot-progress-active"></div>
                    <div class="dot-progress-segment relative overflow-hidden">
                        <div class="absolute inset-0 bg-[var(--accent-teal)] opacity-40 animate-pulse"></div>
                    </div>
                </div>
                <span class="text-[11px] font-bold text-[var(--muted-slate)] uppercase tracking-wider">Step 4 / 20</span>
            </div>
        </header>
        <!-- /#header_001 -->

        <!-- #scroll-content_002 -->
        <div class="flex-1 overflow-y-auto px-8 flex flex-col items-center justify-center">
            <!-- #vocabulary-card_003 -->
            <div class="tactile-card w-full aspect-[3/4] rounded-[32px] flex flex-col relative overflow-hidden">
                <div class="flex-1 flex flex-col items-center justify-center p-12 text-center">
                    <span class="label-caps text-[var(--muted-slate)] mb-6">Do you know this?</span>
                    <h1 class="editorial-title text-white text-[48px] font-bold mb-4 tracking-tight">Pragmatic</h1>
                    <p class="text-[var(--muted-slate)] text-lg italic">/præɡˈmætɪk/</p>
                </div>
                
                <!-- #card-base-action_004 -->
                <div class="p-4 border-t border-white/[0.04] bg-white/[0.02]">
                    <button class="w-full h-14 flex items-center justify-center gap-2 text-[var(--accent-teal)] font-semibold active:opacity-60">
                        <iconify-icon icon="ph:eye-light" class="text-xl"></iconify-icon>
                        <span>Show Definition</span>
                    </button>
                </div>
                <!-- /#card-base-action_004 -->
            </div>
            <!-- /#vocabulary-card_003 -->

            <p class="mt-8 text-center text-[var(--muted-slate)] text-sm px-6">
                Think about the word's application in professional context before revealing.
            </p>
        </div>
        <!-- /#scroll-content_002 -->

        <!-- #footer_005 -->
        <footer class="flex-shrink-0 p-8 flex gap-4 bg-[var(--bg-deep)] pb-12">
            <button class="flex-1 h-[68px] bg-white/[0.04] border border-white/[0.06] rounded-2xl flex flex-col items-center justify-center active:bg-white/[0.08]">
                <iconify-icon icon="ph:x-circle-light" class="text-2xl text-white/40 mb-0.5"></iconify-icon>
                <span class="text-[11px] font-bold text-white/40 uppercase tracking-widest">I Don't Know</span>
            </button>
            <button class="flex-1 h-[68px] primary-teal rounded-2xl flex flex-col items-center justify-center active:scale-[0.98] transition-transform">
                <iconify-icon icon="ph:check-circle-bold" class="text-2xl text-white mb-0.5"></iconify-icon>
                <span class="text-[11px] font-bold text-white uppercase tracking-widest">I Know This</span>
            </button>
        </footer>
        <!-- /#footer_005 -->
    </div>
</body>
</html>
