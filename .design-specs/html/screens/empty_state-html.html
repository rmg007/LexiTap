<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>empty_state</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700;800&display=swap');
        :root {
            --bg-deep: #0E1112;
            --accent-teal: #20B2AA;
            --muted-slate: #94A3B8;
            --white-soft: rgba(255, 255, 255, 0.06);
        }
        .iphone-frame {
            width: 393px;
            height: 852px;
            background-color: var(--bg-deep);
            position: relative;
            border-radius: 0px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            overflow: hidden;
            margin: 2rem auto;
        }
        .editorial-title {
            font-family: 'Playfair Display', serif;
        }
        .primary-cta {
            background: linear-gradient(135deg, var(--accent-teal) 0%, #178F88 100%);
            box-shadow: 0 4px 20px rgba(32, 178, 170, 0.3), inset 0 1px 1px rgba(255,255,255,0.2);
        }
        .tactile-card {
            background: linear-gradient(145deg, #1A1E1F, #141718);
            border: 1px solid var(--white-soft);
        }
    </style>
</head>
<body class="bg-neutral-900 font-['Inter']">
    <div class="iphone-frame flex flex-col text-white">
        <!-- #header_101 -->
        <header class="flex-shrink-0 pt-16 px-8 flex justify-between items-center">
            <div class="w-10 h-10 rounded-xl bg-white/[0.04] flex items-center justify-center border border-white/10">
                <iconify-icon icon="ph:user-light" class="text-xl text-[var(--muted-slate)]"></iconify-icon>
            </div>
            <div class="flex items-center gap-1.5 px-3 py-1.5 bg-white/[0.04] border border-white/10 rounded-full">
                <iconify-icon icon="ph:lightning-fill" class="text-[var(--accent-teal)] text-xs"></iconify-icon>
                <span class="text-xs font-bold uppercase tracking-wider">LexiTap</span>
            </div>
            <div class="w-10 h-10 rounded-xl bg-white/[0.04] flex items-center justify-center border border-white/10">
                <iconify-icon icon="ph:gear-light" class="text-xl text-[var(--muted-slate)]"></iconify-icon>
            </div>
        </header>
        <!-- /#header_101 -->

        <!-- #scroll-content_102 -->
        <div class="flex-1 flex flex-col items-center justify-center px-12 text-center">
            <div class="mb-10 relative">
                <div class="absolute -inset-10 bg-[var(--accent-teal)]/5 blur-3xl rounded-full"></div>
                <iconify-icon icon="ph:map-trifold-light" class="text-[100px] text-[var(--muted-slate)] relative z-10 opacity-40"></iconify-icon>
            </div>
            
            <h2 class="editorial-title text-[32px] font-bold mb-4 leading-tight text-[var(--muted-slate)] opacity-80">
                Your Map is empty
            </h2>
            
            <p class="text-[var(--muted-slate)] text-[16px] leading-relaxed mb-12">
                Welcome Home. Your personal knowledge frontier is ready to be mapped. Start your first session to begin.
            </p>

            <button class="primary-cta w-full h-[64px] rounded-xl text-white font-bold text-[18px] flex items-center justify-center gap-3 active:scale-[0.98] transition-all">
                <iconify-icon icon="ph:play-fill" class="text-xl"></iconify-icon>
                <span>Start your first session</span>
            </button>
        </div>
        <!-- /#scroll-content_102 -->

        <!-- #footer_103 -->
        <footer class="flex-shrink-0 p-8 pb-12">
            <div class="tactile-card rounded-2xl p-6 flex items-center gap-4">
                <div class="w-12 h-12 rounded-full bg-[var(--accent-teal)]/10 flex items-center justify-center">
                    <iconify-icon icon="ph:info-light" class="text-2xl text-[var(--accent-teal)]"></iconify-icon>
                </div>
                <div class="flex-1 text-left">
                    <p class="text-[11px] font-bold text-[var(--muted-slate)] uppercase tracking-wider mb-1">Pro Tip</p>
                    <p class="text-[13px] text-white/60 leading-snug">Daily consistency increases long-term retention by up to 40%.</p>
                </div>
            </div>
        </footer>
        <!-- /#footer_103 -->
    </div>
</body>
</html>
