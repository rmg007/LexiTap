<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexiTap - Goal Selection (Light)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700;800&display=swap');
        
        :root {
            --bg-light: #F9FBFA;
            --card-bg-start: #FFFFFF;
            --card-bg-end: #F5F7F6;
            --accent-teal: #178F88;
            --accent-amber: #D97706;
            --text-primary: #1A1D1E;
            --text-muted: #5F6368;
            --border-muted: rgba(0,0,0,0.06);
        }

        body { font-family: 'Inter', sans-serif; background-color: #F1F3F4; margin: 0; }
        .editorial-title { font-family: 'Playfair Display', serif; letter-spacing: -0.01em; }
        .iphone-frame { width: 393px; height: 852px; background-color: var(--bg-light); position: relative; margin: 2rem auto; overflow: hidden; }

        .progress-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(0,0,0,0.06); transition: all 0.3s ease; }
        .progress-dot.active { background: var(--accent-teal); transform: scale(1.2); box-shadow: 0 0 10px rgba(23, 143, 136, 0.3); }

        .tactile-card {
            background: linear-gradient(145deg, var(--card-bg-start), var(--card-bg-end));
            border: 1px solid var(--border-muted);
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tactile-card-active {
            background: linear-gradient(145deg, #F0FDF4, #FFFFFF);
            border: 1px solid var(--accent-teal);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.06), inset 0 0 8px rgba(23, 143, 136, 0.05);
        }

        .label-caps { font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent-amber); }
        .primary-cta { background: linear-gradient(135deg, var(--accent-teal) 0%, #147D76 100%); box-shadow: 0 4px 20px rgba(23, 143, 136, 0.2); }
    </style>
</head>
<body>
    <div class="iphone-frame flex flex-col">
        <header class="flex-shrink-0 pt-16 px-8 pb-8 text-[var(--text-primary)]">
            <div class="flex gap-2.5 mb-10">
                <div class="progress-dot active"></div>
                <div class="progress-dot"></div>
                <div class="progress-dot"></div>
                <div class="progress-dot"></div>
                <div class="progress-dot"></div>
            </div>
            <h1 class="editorial-title text-[34px] font-bold leading-tight mb-3">
                What is your <br/><span class="text-[var(--accent-teal)]">primary goal?</span>
            </h1>
            <p class="text-[17px] text-[var(--text-muted)] font-medium">We will customize your path to success.</p>
        </header>

        <div class="flex-1 overflow-y-auto px-8 space-y-4">
            <div class="tactile-card rounded-xl p-6 flex items-center justify-between">
                <div class="flex items-center gap-5">
                    <div class="w-12 h-12 rounded-xl bg-gray-50 border border-gray-100 flex items-center justify-center">
                        <iconify-icon icon="ph:graduation-cap-duotone" class="text-3xl text-[var(--text-primary)]"></iconify-icon>
                    </div>
                    <div>
                        <h3 class="font-bold text-[18px] text-[var(--text-primary)]">TOEFL iBT</h3>
                        <p class="text-[14px] text-[var(--text-muted)]">University entrance</p>
                    </div>
                </div>
                <iconify-icon icon="ph:circle" class="text-2xl text-gray-200"></iconify-icon>
            </div>

            <div class="tactile-card tactile-card-active rounded-xl p-6 flex items-center justify-between">
                <div class="flex items-center gap-5">
                    <div class="w-12 h-12 rounded-xl bg-[var(--accent-teal)]/5 border border-[var(--accent-teal)]/10 flex items-center justify-center">
                        <iconify-icon icon="ph:certificate-duotone" class="text-3xl text-[var(--accent-teal)]"></iconify-icon>
                    </div>
                    <div>
                        <h3 class="font-bold text-[18px] text-[var(--text-primary)]">IELTS Academic</h3>
                        <p class="text-[14px] text-[var(--text-muted)]">Global standards</p>
                    </div>
                </div>
                <div class="w-6 h-6 rounded-full bg-[var(--accent-teal)] flex items-center justify-center shadow-lg shadow-teal-600/20">
                    <iconify-icon icon="ph:check-bold" class="text-white text-xs"></iconify-icon>
                </div>
            </div>

            <div class="tactile-card rounded-xl p-6 flex items-center justify-between">
                <div class="flex items-center gap-5">
                    <div class="w-12 h-12 rounded-xl bg-gray-50 border border-gray-100 flex items-center justify-center">
                        <iconify-icon icon="ph:briefcase-duotone" class="text-3xl text-[var(--text-primary)]"></iconify-icon>
                    </div>
                    <div>
                        <h3 class="font-bold text-[18px] text-[var(--text-primary)]">Business English</h3>
                        <p class="text-[14px] text-[var(--text-muted)]">Work advancement</p>
                    </div>
                </div>
                <iconify-icon icon="ph:circle" class="text-2xl text-gray-200"></iconify-icon>
            </div>

            <div class="mt-10 p-6 rounded-xl bg-[var(--accent-amber)]/[0.05] border border-[var(--accent-amber)]/10">
                <div class="label-caps mb-3">Helpful Fact</div>
                <p class="text-[15px] text-[var(--text-muted)] leading-relaxed font-medium italic">
                    Users with a specific goal learn <span class="text-[var(--text-primary)] font-bold">24% faster</span> on average.
                </p>
            </div>
        </div>

        <footer class="p-8 pb-12">
            <button class="primary-cta w-full h-[64px] rounded-xl text-white font-bold text-[18px] flex items-center justify-center transition-all">
                Continue
            </button>
        </footer>
    </div>
</body>
</html>
