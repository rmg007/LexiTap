<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexiTap - Proficiency (Light)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700;800&display=swap');
        
        :root {
            --bg-light: #F9FBFA;
            --card-bg-start: #FFFFFF;
            --card-bg-end: #F5F7F6;
            --accent-teal: #178F88;
            --accent-amber: #D97706;
            --text-primary: #1A1D1E;
            --text-muted: #5F6368;
            --border-muted: rgba(0,0,0,0.06);
        }

        body { font-family: 'Inter', sans-serif; background-color: #F1F3F4; margin: 0; }
        .editorial-title { font-family: 'Playfair Display', serif; letter-spacing: -0.01em; }
        .iphone-frame { width: 393px; height: 852px; background-color: var(--bg-light); position: relative; margin: 2rem auto; overflow: hidden; }

        .progress-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(0,0,0,0.06); }
        .progress-dot.active { background: var(--accent-teal); transform: scale(1.2); box-shadow: 0 0 10px rgba(23, 143, 136, 0.3); }

        .tactile-card {
            background: linear-gradient(145deg, var(--card-bg-start), var(--card-bg-end));
            border: 1px solid var(--border-muted);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        .tactile-card-active {
            background: linear-gradient(145deg, #F0FDF4, #FFFFFF);
            border: 1px solid var(--accent-teal);
            box-shadow: 0 8px 25px rgba(0,0,0,0.05), inset 0 0 10px rgba(23, 143, 136, 0.04);
            transform: scale(1.02);
        }

        .level-bar { height: 6px; background: rgba(0,0,0,0.04); border-radius: 10px; overflow: hidden; display: flex; gap: 3px; }
        .level-segment { flex: 1; transition: all 0.5s ease; }
        .level-segment.filled { background: var(--accent-teal); }

        .primary-cta { background: linear-gradient(135deg, var(--accent-teal) 0%, #147D76 100%); box-shadow: 0 4px 20px rgba(23, 143, 136, 0.2); }
    </style>
</head>
<body>
    <div class="iphone-frame flex flex-col">
        <header class="flex-shrink-0 pt-16 px-8 pb-8 text-[var(--text-primary)]">
            <div class="flex gap-2.5 mb-10">
                <div class="progress-dot active"></div>
                <div class="progress-dot active"></div>
                <div class="progress-dot"></div>
                <div class="progress-dot"></div>
                <div class="progress-dot"></div>
            </div>
            <h1 class="editorial-title text-[34px] font-bold leading-tight mb-3">
                Assess your current <br/><span class="text-[var(--accent-teal)]">proficiency.</span>
            </h1>
            <p class="text-[17px] text-[var(--text-muted)] font-medium">Help us find your starting point.</p>
        </header>

        <div class="flex-1 overflow-y-auto px-8 space-y-4">
            <div class="tactile-card rounded-xl p-6">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h3 class="font-bold text-[18px] text-[var(--text-primary)]">Just starting</h3>
                        <p class="text-[14px] text-[var(--text-muted)]">I am new to this language</p>
                    </div>
                    <iconify-icon icon="ph:circle-light" class="text-2xl text-gray-200"></iconify-icon>
                </div>
                <div class="level-bar">
                    <div class="level-segment filled"></div>
                    <div class="level-segment"></div>
                    <div class="level-segment"></div>
                    <div class="level-segment"></div>
                </div>
            </div>

            <div class="tactile-card tactile-card-active rounded-xl p-6">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h3 class="font-bold text-[18px] text-[var(--text-primary)]">Everyday English is okay</h3>
                        <p class="text-[14px] text-[var(--text-muted)]">Can handle daily interactions</p>
                    </div>
                    <div class="w-6 h-6 rounded-full bg-[var(--accent-teal)] flex items-center justify-center shadow-lg shadow-teal-600/20">
                        <iconify-icon icon="ph:check-bold" class="text-white text-xs"></iconify-icon>
                    </div>
                </div>
                <div class="level-bar">
                    <div class="level-segment filled"></div>
                    <div class="level-segment filled"></div>
                    <div class="level-segment"></div>
                    <div class="level-segment"></div>
                </div>
            </div>

            <div class="tactile-card rounded-xl p-6">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h3 class="font-bold text-[18px] text-[var(--text-primary)]">I am advanced</h3>
                        <p class="text-[14px] text-[var(--text-muted)]">High fluency in most contexts</p>
                    </div>
                    <iconify-icon icon="ph:circle-light" class="text-2xl text-gray-200"></iconify-icon>
                </div>
                <div class="level-bar">
                    <div class="level-segment filled"></div>
                    <div class="level-segment filled"></div>
                    <div class="level-segment filled"></div>
                    <div class="level-segment"></div>
                </div>
            </div>

            <div class="tactile-card rounded-xl p-6">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h3 class="font-bold text-[18px] text-[var(--text-primary)]">Exam Preparation</h3>
                        <p class="text-[14px] text-[var(--text-muted)]">Preparing for TOEFL, IELTS, or a similar exam.</p>
                    </div>
                    <iconify-icon icon="ph:circle-light" class="text-2xl text-gray-200"></iconify-icon>
                </div>
                <div class="level-bar">
                    <div class="level-segment filled"></div>
                    <div class="level-segment filled"></div>
                    <div class="level-segment filled"></div>
                    <div class="level-segment filled"></div>
                </div>
            </div>
        </div>

        <footer class="p-8 pb-12">
            <button class="primary-cta w-full h-[64px] rounded-xl text-white font-bold text-[18px] flex items-center justify-center">
                Continue
            </button>
        </footer>
    </div>
</body>
</html>
