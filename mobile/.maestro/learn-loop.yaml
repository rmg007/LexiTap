# Maestro E2E: learn loop — card batch → quick-check → home.
#
# Proves the native navigation chain that RTL tests cannot:
#   /learn (LearnCardScreen) → onComplete(batch) → router.replace('/learn-check')
#   → LearnQuickCheckScreen → onComplete() → router.replace('/')
#
# Selector notes (iOS + React Native 0.85 / Expo SDK 56):
#   - On iOS, all element text is in `accessibilityText` (never `text`). Maestro
#     matches `tapOn: text:` against `accessibilityText` with anchored regex.
#   - PrimaryButton wraps label text in LinearGradient, which hides inner Text
#     from XCUITest. The Pressable's `accessibilityLabel` is the only selector.
#   - When a Pressable carries an explicit `accessibilityLabel` override the
#     child Text is absorbed: tap by the override, not the visual string.
#   - `visible:` uses substring/unanchored matching; `tapOn: text:` is anchored.
#
# Run: maestro test mobile/.maestro/learn-loop.yaml
#   (requires app installed on a booted iOS/Android device or simulator)
appId: com.lexitap.app
---
# ── 1. Launch from scratch ──────────────────────────────────────────────────
- launchApp:
    clearState: true

# ── 2. Tap through minimum onboarding to reach Home ──────────────────────────
# O-0: Age gate
# Button has accessibilityLabel override "Continue to LexiTap" (age ≥ 16 path).
- extendedWaitUntil:
    visible: "Your age"
    timeout: 30000
- tapOn:
    text: "Continue to LexiTap"

# O-1: Welcome
- extendedWaitUntil:
    visible: "Get started"
    timeout: 10000
- tapOn:
    text: "Get started"

# O-2: Goal selection — pick "General English" (first option, value='general')
# SelectionCard uses accessibilityLabel={label}; label is "General English".
- extendedWaitUntil:
    visible: "General English"
    timeout: 10000
- tapOn:
    text: "General English"
- tapOn:
    text: "Continue"

# O-4: Adaptive diagnostic — answer "No, not yet" for every word.
# Use repeat-while so the loop exits naturally when the diagnostic ends and
# the app transitions to O-5 (Knowledge Map). The `times: 60` ceiling is a
# safety guard; max interactions = 25 words + 3 pseudo-words = 28 total.
#
# sleep: 2000 after each tap prevents the testmanagerd snapshot-timeout crash.
# Without it, repeated rapid view-hierarchy fetches (2 per iteration: the
# while-condition check + the tapOn find) cause testmanagerd to slow from
# 3s/iteration to 34s/iteration by tap 20, then crash with "Timed out while
# fetching snapshot from testmanagerd". The sleep gives testmanagerd recovery
# time between snapshots and keeps the per-iteration budget ~5s.
- repeat:
    while:
      visible: "No, not yet"
    times: 60
    commands:
      - tapOn:
          text: "No, not yet"
      - waitForAnimationToEnd

# O-5: Knowledge Map reveal
- extendedWaitUntil:
    visible: "Start learning"
    timeout: 30000
- tapOn:
    text: "Start learning"

# O-6: Paywall — dismiss to continue for free (marks onboarding complete).
# Dismiss Pressable has accessibilityLabel="Dismiss paywall"; inner Icon is
# not text-selectable. PaywallScreen applies useSafeAreaInsets() on the
# header row (safe-area fix landed 2026-06-10, build 3).
- extendedWaitUntil:
    visible: "Unlock LexiTap"
    timeout: 10000
- tapOn:
    text: "Dismiss paywall"

# ── 3. Home: tap "Learn new words" ──────────────────────────────────────────
# PaperButton (secondary variant) doesn't expose accessibilityLabel to XCUITest
# on New Architecture — use testID="learn-new-words" instead.
- extendedWaitUntil:
    visible:
      id: "learn-new-words"
    timeout: 30000
- tapOn:
    id: "learn-new-words"

# ── 4. Advance through ALL cards in the batch ────────────────────────────────
# Each card has a "Got it" primary button (accessibilityLabel="Got it").
# The final tap calls onComplete(batch) → router.replace('/learn-check').
- extendedWaitUntil:
    visible: "Got it"
    timeout: 30000
- repeat:
    while:
      visible: "Got it"
    times: 10
    commands:
      - tapOn:
          text: "Got it"

# ── 5. Assert Quick-check screen is visible ──────────────────────────────────
# LearnQuickCheckScreen renders a "Quick check" caption in the header.
- extendedWaitUntil:
    visible: "Quick check"
    timeout: 30000
- assertVisible: "Quick check"

# ── 6. Answer every quick-check question (tap an option, Submit, Continue) ───
# MultipleChoice flow: select an option card (radio), then tap Submit.
# After Submit, inline feedback appears with a "Continue" button, which
# advances to the next question — or back to Home on the last one. The
# header shows "n/10", so this must loop, not run once (confirmed live: a
# single pass left the flow stuck on question 2/10, not Home).
#
# `index: 0` was flaky — it hit the "Back" link (also index 0 in the full
# hierarchy) instead of the first radio option, leaving `selected === null`,
# which keeps Submit disabled and "Continue" never appears (confirmed live,
# not a guess). Fixed by giving each option a stable testID instead of
# relying on tap order.
- repeat:
    while:
      visible: "Quick check"
    times: 12
    commands:
      - tapOn:
          id: "quiz-option-0"
      - tapOn:
          text: "Submit"
      - extendedWaitUntil:
          visible: "Continue"
          timeout: 20000
      - tapOn:
          text: "Continue"

# ── 7. Assert return to Home / study-session tab ─────────────────────────────
# HomeScreen renders "Learn new words" secondary button — use testID selector
# (PaperButton/New Architecture accessibility limitation, same as step 3).
- extendedWaitUntil:
    visible:
      id: "learn-new-words"
    timeout: 30000
- assertVisible:
    id: "learn-new-words"
