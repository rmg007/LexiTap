# Maestro E2E: learn loop — card batch → quick-check → home.
#
# Proves the native navigation chain that RTL tests cannot:
#   /learn (LearnCardScreen) → onComplete(batch) → router.replace('/learn-check')
#   → LearnQuickCheckScreen → onComplete() → router.replace('/')
#
# Selector notes (iOS + React Native 0.85 / Expo SDK 56):
#   - On iOS, all element text is in `accessibilityText` (never `text`). Maestro
#     matches `tapOn: text:` against `accessibilityText` with anchored regex.
#   - PrimaryButton wraps label text in LinearGradient, which hides inner Text
#     from XCUITest. The Pressable's `accessibilityLabel` is the only selector.
#   - When a Pressable carries an explicit `accessibilityLabel` override the
#     child Text is absorbed: tap by the override, not the visual string.
#   - `visible:` uses substring/unanchored matching; `tapOn: text:` is anchored.
#
# Run: maestro test mobile/.maestro/learn-loop.yaml
#   (requires app installed on a booted iOS/Android device or simulator)
appId: com.lexitap.app
---
# ── 1. Launch from scratch ──────────────────────────────────────────────────
- launchApp:
    clearState: true

# ── 2. Tap through minimum onboarding to reach Home ──────────────────────────
# O-0: Age gate
# Button has accessibilityLabel override "Continue to LexiTap" (age ≥ 16 path).
- extendedWaitUntil:
    visible: "Your age"
    timeout: 30000
- tapOn:
    text: "Continue to LexiTap"

# O-1: Welcome
- extendedWaitUntil:
    visible: "Get started"
    timeout: 10000
- tapOn:
    text: "Get started"

# O-2: Goal selection — pick "General English" (first option, value='general')
# SelectionCard uses accessibilityLabel={label}; label is "General English".
- extendedWaitUntil:
    visible: "General English"
    timeout: 10000
- tapOn:
    text: "General English"
- tapOn:
    text: "Continue"

# O-4: Adaptive diagnostic — answer "No, not yet" for every word.
# Use repeat-while so the loop exits naturally when the diagnostic ends and
# the app transitions to O-5 (Knowledge Map). This avoids the XCUITest
# snapshot-timeout crash that occurred with a fixed repeat+runFlow-when loop
# (the tight-polling iterations after the diagnostic ends would race the
# knowledge-map animation). The `times: 50` ceiling is a safety guard;
# real convergence with all-No answers takes ~15-35 questions.
- repeat:
    while:
      visible: "No, not yet"
    times: 50
    commands:
      - tapOn:
          text: "No, not yet"

# O-5: Knowledge Map reveal
- extendedWaitUntil:
    visible: "Start learning"
    timeout: 15000
- tapOn:
    text: "Start learning"

# O-6: Paywall — dismiss to continue for free (marks onboarding complete).
# Dismiss Pressable has accessibilityLabel="Dismiss paywall"; inner Icon is
# not text-selectable. PaywallScreen applies useSafeAreaInsets() on the
# header row (safe-area fix landed 2026-06-10, build 3).
- extendedWaitUntil:
    visible: "Unlock LexiTap"
    timeout: 10000
- tapOn:
    text: "Dismiss paywall"

# ── 3. Home: tap "Learn new words" ──────────────────────────────────────────
# The button label is dynamic: "Learn new words (N left today)".
# Use anchored regex prefix match to handle the count suffix.
- extendedWaitUntil:
    visible: "Learn new words"
    timeout: 15000
- tapOn:
    text: "Learn new words.*"

# ── 4. Advance through ALL cards in the batch ────────────────────────────────
# Each card has a "Got it" primary button (accessibilityLabel="Got it").
# The final tap calls onComplete(batch) → router.replace('/learn-check').
- extendedWaitUntil:
    visible: "Got it"
    timeout: 15000
- repeat:
    while:
      visible: "Got it"
    times: 10
    commands:
      - tapOn:
          text: "Got it"

# ── 5. Assert Quick-check screen is visible ──────────────────────────────────
# LearnQuickCheckScreen renders a "Quick check" caption in the header.
- extendedWaitUntil:
    visible: "Quick check"
    timeout: 15000
- assertVisible: "Quick check"

# ── 6. Answer one question (tap any option, then Continue) ───────────────────
# MultipleChoice options have accessibilityRole="radio" and a word-definition
# label. We cannot predict the label at write-time, so tap the first interactive
# radio element. `index: 0` with no text picks the first interactive element.
- tapOn:
    index: 0
- extendedWaitUntil:
    visible: "Continue"
    timeout: 10000
- tapOn:
    text: "Continue"

# ── 7. Assert return to Home / study-session tab ─────────────────────────────
# HomeScreen renders "Learn new words (N left today)" as the secondary CTA.
- extendedWaitUntil:
    visible: "Learn new words"
    timeout: 15000
- assertVisible: "Learn new words"
