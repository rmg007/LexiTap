<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- White background -->
  <rect width="1024" height="1024" fill="#F2F5F6"/>

  <!-- Rounded teal square (radius ~15% = 153.6) -->
  <rect x="80" y="80" width="864" height="864" rx="153.6" ry="153.6" fill="#20B2AA"/>

  <!-- Monogram "LT" in white -->
  <!-- Using SF Pro Display equivalent (fallback to system sans-serif) -->
  <text
    x="512"
    y="680"
    font-family="system-ui, -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif"
    font-size="520"
    font-weight="600"
    text-anchor="middle"
    fill="#F2F5F6"
    dominant-baseline="middle"
  >LT</text>
</svg>
