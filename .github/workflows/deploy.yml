name: Deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to deploy (e.g., v0.1.0)'
        required: true

jobs:
  build-and-submit-ios:
    name: iOS — Build & Submit to TestFlight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Authenticate with EAS
        env:
          EAS_TOKEN: ${{ secrets.EAS_TOKEN }}
        run: |
          npx eas whoami || true

      - name: Build iOS production
        working-directory: mobile
        env:
          EAS_TOKEN: ${{ secrets.EAS_TOKEN }}
        run: |
          npx eas build --platform ios --profile production --wait

      - name: Submit iOS to TestFlight
        working-directory: mobile
        env:
          EAS_TOKEN: ${{ secrets.EAS_TOKEN }}
        run: |
          npx eas submit --platform ios --profile production --non-interactive

  build-and-submit-android:
    name: Android — Build & Submit to Play Store
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Authenticate with EAS
        env:
          EAS_TOKEN: ${{ secrets.EAS_TOKEN }}
        run: |
          npx eas whoami || true

      - name: Build Android production
        working-directory: mobile
        env:
          EAS_TOKEN: ${{ secrets.EAS_TOKEN }}
        run: |
          npx eas build --platform android --profile production --wait

      - name: Submit Android to Play Store
        working-directory: mobile
        env:
          EAS_TOKEN: ${{ secrets.EAS_TOKEN }}
        run: |
          npx eas submit --platform android --profile production --non-interactive
